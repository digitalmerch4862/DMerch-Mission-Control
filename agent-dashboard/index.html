<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent OS Dashboard</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          },
          colors: {
            base: '#0A0F1E',
            purpleGlow: '#7C3AED',
            pinkGlow: '#EC4899',
            cyanGlow: '#06B6D4',
            amberGlow: '#F59E0B'
          },
          boxShadow: {
            softGlow: '0 10px 40px rgba(124,58,237,0.22), 0 0 0 1px rgba(255,255,255,0.04)'
          },
          keyframes: {
            cardIn: {
              '0%': { opacity: '0', transform: 'translateY(16px) scale(0.98)' },
              '100%': { opacity: '1', transform: 'translateY(0) scale(1)' }
            },
            tabFadeIn: {
              '0%': { opacity: '0', transform: 'translateY(4px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            }
          },
          animation: {
            cardIn: 'cardIn 560ms cubic-bezier(0.22, 1, 0.36, 1) forwards',
            tabFadeIn: 'tabFadeIn 260ms ease-out forwards'
          }
        }
      }
    }
  </script>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Supabase JS SDK CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      color-scheme: dark;
    }

    body {
      background:
        radial-gradient(1200px 600px at -10% -20%, rgba(124, 58, 237, 0.22), transparent 60%),
        radial-gradient(1000px 500px at 110% -30%, rgba(236, 72, 153, 0.18), transparent 60%),
        radial-gradient(900px 500px at 50% 120%, rgba(6, 182, 212, 0.10), transparent 65%),
        #0A0F1E;
      min-height: 100vh;
    }

    .glass-card {
      position: relative;
      border-radius: 1rem;
      border: 1px solid transparent;
      background:
        linear-gradient(145deg, rgba(12, 20, 40, 0.85), rgba(14, 16, 32, 0.72)) padding-box,
        linear-gradient(135deg, rgba(124, 58, 237, 0.9), rgba(236, 72, 153, 0.85), rgba(6, 182, 212, 0.8)) border-box;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 10px 40px rgba(124, 58, 237, 0.2), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .tab-pill {
      position: absolute;
      top: 4px;
      left: 4px;
      height: calc(100% - 8px);
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(124,58,237,0.95), rgba(236,72,153,0.95));
      box-shadow: 0 8px 28px rgba(124,58,237,0.45), 0 2px 10px rgba(236,72,153,0.35);
      transition: transform 300ms cubic-bezier(0.22, 1, 0.36, 1), width 300ms cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 0;
    }

    .tab-btn {
      position: relative;
      z-index: 1;
      transition: color 200ms ease;
    }

    .tab-panel {
      display: none;
      opacity: 0;
    }

    .tab-panel.active {
      display: block;
      animation: tabFadeIn 260ms ease-out forwards;
    }
  </style>
</head>
<body class="font-sans text-slate-100">
  <div class="max-w-7xl mx-auto px-6 py-8 md:py-10">
    <!-- Top Nav -->
    <header class="glass-card p-3 md:p-4 mb-8">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <p class="text-xs uppercase tracking-[0.25em] text-cyanGlow/80">Agent OS</p>
          <h1 class="text-xl md:text-2xl font-semibold">Control Dashboard</h1>
        </div>

        <nav id="tabsNav" class="relative inline-flex bg-white/5 rounded-full p-1 border border-white/10 overflow-hidden">
          <div id="tabPill" class="tab-pill"></div>
          <button class="tab-btn px-4 py-2 text-sm font-medium rounded-full text-white" data-tab="dashboard">Dashboard</button>
          <button class="tab-btn px-4 py-2 text-sm font-medium rounded-full text-slate-300" data-tab="content">Content</button>
          <button class="tab-btn px-4 py-2 text-sm font-medium rounded-full text-slate-300" data-tab="agents">Agents</button>
          <button class="tab-btn px-4 py-2 text-sm font-medium rounded-full text-slate-300" data-tab="tasks">Tasks</button>
          <button class="tab-btn px-4 py-2 text-sm font-medium rounded-full text-slate-300" data-tab="settings">Settings</button>
        </nav>
      </div>
    </header>

    <!-- Tab Panels -->
    <main id="tabPanels" class="space-y-6">
      <section id="panel-dashboard" class="tab-panel active">
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
          <div class="glass-card p-6 opacity-0 card-stagger"><h2 class="text-lg font-semibold">Dashboard</h2></div>
          <div class="glass-card p-6 opacity-0 card-stagger"><h2 class="text-lg font-semibold">Dashboard</h2></div>
          <div class="glass-card p-6 opacity-0 card-stagger"><h2 class="text-lg font-semibold">Dashboard</h2></div>
        </div>
      </section>

      <section id="panel-content" class="tab-panel">
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
          <div class="glass-card p-6 opacity-0 card-stagger"><h2 class="text-lg font-semibold">Content</h2></div>
          <div class="glass-card p-6 opacity-0 card-stagger"><h2 class="text-lg font-semibold">Content</h2></div>
          <div class="glass-card p-6 opacity-0 card-stagger"><h2 class="text-lg font-semibold">Content</h2></div>
        </div>
      </section>

      <section id="panel-agents" class="tab-panel">
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
          <div class="glass-card p-6 opacity-0 card-stagger"><h2 class="text-lg font-semibold">Agents</h2></div>
          <div class="glass-card p-6 opacity-0 card-stagger"><h2 class="text-lg font-semibold">Agents</h2></div>
          <div class="glass-card p-6 opacity-0 card-stagger"><h2 class="text-lg font-semibold">Agents</h2></div>
        </div>
      </section>

      <section id="panel-tasks" class="tab-panel">
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
          <div class="glass-card p-6 opacity-0 card-stagger"><h2 class="text-lg font-semibold">Tasks</h2></div>
          <div class="glass-card p-6 opacity-0 card-stagger"><h2 class="text-lg font-semibold">Tasks</h2></div>
          <div class="glass-card p-6 opacity-0 card-stagger"><h2 class="text-lg font-semibold">Tasks</h2></div>
        </div>
      </section>

      <section id="panel-settings" class="tab-panel">
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
          <div class="glass-card p-6 opacity-0 card-stagger"><h2 class="text-lg font-semibold">Settings</h2></div>
          <div class="glass-card p-6 opacity-0 card-stagger"><h2 class="text-lg font-semibold">Settings</h2></div>
          <div class="glass-card p-6 opacity-0 card-stagger"><h2 class="text-lg font-semibold">Settings</h2></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const SUPABASE_URL = 'https://wthkftbdepnujpbxnivk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0aGtmdGJkZXBudWpwYnhuaXZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzgzNzcsImV4cCI6MjA4ODcxNDM3N30.cW1bRz4gqe5DcT47bj4XjXXJ9NSIlMFzGtRAikC7Rm4';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const nav = document.getElementById('tabsNav');
    const pill = document.getElementById('tabPill');
    const buttons = [...nav.querySelectorAll('.tab-btn')];
    const panels = [...document.querySelectorAll('.tab-panel')];

    function movePillTo(button) {
      const navRect = nav.getBoundingClientRect();
      const btnRect = button.getBoundingClientRect();
      pill.style.width = `${btnRect.width}px`;
      pill.style.transform = `translateX(${btnRect.left - navRect.left}px)`;
    }

    function staggerIn(panel) {
      const cards = [...panel.querySelectorAll('.card-stagger')];
      cards.forEach((card, idx) => {
        card.style.animation = 'none';
        card.style.opacity = '0';
        setTimeout(() => {
          card.style.animation = 'cardIn 560ms cubic-bezier(0.22,1,0.36,1) forwards';
        }, idx * 90);
      });
    }

    function activateTab(tabName) {
      buttons.forEach(btn => {
        const active = btn.dataset.tab === tabName;
        btn.classList.toggle('text-white', active);
        btn.classList.toggle('text-slate-300', !active);
      });

      panels.forEach(panel => {
        const active = panel.id === `panel-${tabName}`;
        panel.classList.toggle('active', active);
      });

      const activeBtn = buttons.find(btn => btn.dataset.tab === tabName);
      const activePanel = document.getElementById(`panel-${tabName}`);
      movePillTo(activeBtn);
      staggerIn(activePanel);
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => activateTab(btn.dataset.tab));
    });

    window.addEventListener('resize', () => {
      const activeBtn = buttons.find(btn => btn.classList.contains('text-white'));
      if (activeBtn) movePillTo(activeBtn);
    });

    // Initial render
    activateTab('dashboard');
  </script>
</body>
</html>
