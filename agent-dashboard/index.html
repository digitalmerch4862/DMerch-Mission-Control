<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent OS Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            base: '#0A0F1E', purpleGlow: '#7C3AED', pinkGlow: '#EC4899', cyanGlow: '#06B6D4', amberGlow: '#F59E0B'
          },
          keyframes: {
            cardIn: {
              '0%': { opacity: '0', transform: 'translateY(16px) scale(0.98)' },
              '100%': { opacity: '1', transform: 'translateY(0) scale(1)' }
            },
            tabFadeIn: {
              '0%': { opacity: '0', transform: 'translateY(4px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            }
          },
          animation: {
            cardIn: 'cardIn 560ms cubic-bezier(0.22, 1, 0.36, 1) forwards',
            tabFadeIn: 'tabFadeIn 260ms ease-out forwards'
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { color-scheme: dark; }
    body {
      background:
        radial-gradient(1200px 600px at -10% -20%, rgba(124,58,237,0.22), transparent 60%),
        radial-gradient(1000px 500px at 110% -30%, rgba(236,72,153,0.18), transparent 60%),
        radial-gradient(900px 500px at 50% 120%, rgba(6,182,212,0.10), transparent 65%),
        #0A0F1E;
      min-height: 100vh;
    }
    .glass-card {
      position: relative;
      border-radius: 1rem;
      border: 1px solid transparent;
      background:
        linear-gradient(145deg, rgba(12,20,40,0.85), rgba(14,16,32,0.72)) padding-box,
        linear-gradient(135deg, rgba(124,58,237,0.9), rgba(236,72,153,0.85), rgba(6,182,212,0.8)) border-box;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 10px 40px rgba(124,58,237,0.2), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .agent-card {
      border-left-width: 3px;
      border-left-style: solid;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04), 0 10px 30px rgba(0,0,0,0.28);
    }
    .tab-pill {
      position: absolute; top: 4px; left: 4px; height: calc(100% - 8px); border-radius: 999px;
      background: linear-gradient(90deg, rgba(124,58,237,0.95), rgba(236,72,153,0.95));
      box-shadow: 0 8px 28px rgba(124,58,237,0.45), 0 2px 10px rgba(236,72,153,0.35);
      transition: transform 300ms cubic-bezier(0.22,1,0.36,1), width 300ms cubic-bezier(0.22,1,0.36,1);
      z-index: 0;
    }
    .tab-btn { position: relative; z-index: 1; transition: color 200ms ease; }
    .tab-panel { display: none; opacity: 0; }
    .tab-panel.active { display: block; animation: tabFadeIn 260ms ease-out forwards; }

    @keyframes cardIn {
      0% { opacity: 0; transform: translateY(16px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes tabFadeIn {
      0% { opacity: 0; transform: translateY(4px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .kanban-column { border: none; background: transparent; }
    .kanban-add-btn { margin-top: 10px; color: #94a3b8; font-size: 13px; }
    .kanban-add-btn:hover { color: #e2e8f0; }
    .task-card { background: rgba(15,23,42,0.75); border: 1px solid rgba(148,163,184,0.2); border-radius: 12px; padding: 10px; transition: transform .15s ease, box-shadow .2s ease; }
    .task-card.dragging { opacity: .7; transform: scale(1.02); box-shadow: 0 10px 28px rgba(6,182,212,.25); }
    .drop-highlight { outline: 2px dashed rgba(6,182,212,.5); background: rgba(6,182,212,.06); }
    .dot-menu { position: relative; }
    .dot-dropdown { position: absolute; right: 0; top: 22px; z-index: 20; min-width: 100px; background: #111827; border: 1px solid rgba(148,163,184,.25); border-radius: 8px; overflow: hidden; }
    .dot-dropdown button { display:block; width:100%; text-align:left; padding:6px 10px; font-size:12px; }
    .dot-dropdown button:hover { background: rgba(148,163,184,.15); }

  </style>
</head>

  <script>
    const SUPABASE_URL = 'https://wthkftbdepnujpbxnivk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0aGtmdGJkZXBudWpwYnhuaXZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzgzNzcsImV4cCI6MjA4ODcxNDM3N30.cW1bRz4gqe5DcT47bj4XjXXJ9NSIlMFzGtRAikC7Rm4';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const AGENTS = [
      { name: 'Kristel', emoji: '🧠', role: 'Research Analyst', color: '#EC4899' },
      { name: 'Nami', emoji: '✍️', role: 'Content Writer', color: '#3B82F6' },
      { name: 'Sanji', emoji: '📈', role: 'Marketing Strategist', color: '#EAB308' },
      { name: 'Zoro', emoji: '💻', role: 'Full Stack Developer', color: '#10B981' },
      { name: 'Luffy', emoji: '📱', role: 'Social Media Manager', color: '#EF4444' }
    ];

    const AGENT_NAME_ALIASES = {
      'alex': 'Kristel',
      'maya': 'Nami',
      'jordan': 'Sanji',
      'dev': 'Zoro',
      'sam': 'Luffy',
      'kristel': 'Kristel',
      'nami': 'Nami',
      'sanji': 'Sanji',
      'zoro': 'Zoro',
      'luffy': 'Luffy'
    };

    function normalizeAgentName(raw) {
      if (!raw) return '';
      const key = String(raw).trim().toLowerCase();
      return AGENT_NAME_ALIASES[key] || String(raw).trim();
    }

    const nav = document.getElementById('tabsNav');
    const pill = document.getElementById('tabPill');
    const buttons = [...nav.querySelectorAll('.tab-btn')];
    const panels = [...document.querySelectorAll('.tab-panel')];

    const agentsCardsEl = document.getElementById('agentsCards');
    const activityFeedEl = document.getElementById('activityFeed');
    const taskStatsEl = document.getElementById('taskStats');
    const modelUsageRowsEl = document.getElementById('modelUsageRows');
    const agentsLastSyncEl = document.getElementById('agentsLastSync');

    let agentsInitialized = false;
    let tasksInitialized = false;
    let tasksDonutChart = null;

    const todoColumnEl = document.getElementById('todoColumn');
    const inProgressColumnEl = document.getElementById('inProgressColumn');
    const doneColumnEl = document.getElementById('doneColumn');
    const todoCountEl = document.getElementById('todoCount');
    const inProgressCountEl = document.getElementById('inProgressCount');
    const doneCountEl = document.getElementById('doneCount');
    const tasksCompactStatsEl = document.getElementById('tasksCompactStats');
    const tasksMotivationBadgeEl = document.getElementById('tasksMotivationBadge');
    const taskFilterCategoryEl = document.getElementById('taskFilterCategory');
    const taskFilterPriorityEl = document.getElementById('taskFilterPriority');
    const addFormTodoEl = document.getElementById('addFormTodo');
    const addFormInProgressEl = document.getElementById('addFormInProgress');
    const addFormDoneEl = document.getElementById('addFormDone');
    const editTaskModalEl = document.getElementById('editTaskModal');
    const editTaskFormEl = document.getElementById('editTaskForm');

    function movePillTo(button) {
      const navRect = nav.getBoundingClientRect();
      const btnRect = button.getBoundingClientRect();
      pill.style.width = `${btnRect.width}px`;
      pill.style.transform = `translateX(${btnRect.left - navRect.left}px)`;
    }

    function staggerIn(panel) {
      const cards = [...panel.querySelectorAll('.card-stagger')];
      cards.forEach((card, idx) => {
        card.style.animation = 'none';
        card.style.opacity = '0';
        setTimeout(() => { card.style.animation = 'cardIn 560ms cubic-bezier(0.22,1,0.36,1) forwards'; }, idx * 90);
      });
    }

    function formatDateTime(value) {
      if (!value) return 'N/A';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return 'N/A';
      return date.toLocaleString();
    }

    function startOfToday() {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function startOfWeek() {
      const d = new Date();
      const day = d.getDay();
      const diff = day === 0 ? 6 : day - 1;
      d.setDate(d.getDate() - diff);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function statusClass(status) {
      const s = (status || '').toLowerCase();
      if (s === 'completed') return 'bg-emerald-500/20 text-emerald-300 border border-emerald-400/30';
      if (s === 'failed') return 'bg-red-500/20 text-red-300 border border-red-400/30';
      return 'bg-slate-500/20 text-slate-300 border border-slate-400/30';
    }

    function renderEmptyState(message) {
      const block = `<div class="text-sm text-slate-400 border border-white/10 rounded-lg p-3">${message}</div>`;
      activityFeedEl.innerHTML = block;
    }

    function renderAgentCards(latestByAgent, todayCountByAgent) {
      agentsCardsEl.innerHTML = AGENTS.map(agent => {
        const latest = latestByAgent[agent.name] || null;
        const model = latest?.model_used || 'N/A';
        const lastTask = latest?.task_description || 'No data yet';
        const lastActive = latest?.created_at ? formatDateTime(latest.created_at) : 'N/A';
        const tasksToday = todayCountByAgent[agent.name] || 0;

        return `
          <div class="glass-card agent-card p-5 opacity-0 card-stagger" style="border-left-color:${agent.color}; box-shadow: 0 0 28px ${agent.color}22;">
            <div class="flex items-start justify-between gap-3 mb-4">
              <div>
                <h3 class="text-lg font-bold">${agent.emoji} ${agent.name}</h3>
                <p class="text-xs text-slate-400">${agent.role}</p>
              </div>
              <div class="inline-flex items-center gap-2 text-xs bg-emerald-500/15 text-emerald-300 px-2 py-1 rounded-full border border-emerald-400/25">
                <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
                Connected
              </div>
            </div>
            <div class="space-y-2 text-sm">
              <p><span class="text-slate-400">Model:</span> <span class="text-slate-100">${model}</span></p>
              <p><span class="text-slate-400">Last task:</span> <span class="text-slate-100">${lastTask}</span></p>
              <p><span class="text-slate-400">Last active:</span> <span class="text-slate-100">${lastActive}</span></p>
              <p><span class="text-slate-400">Tasks today:</span> <span class="text-slate-100">${tasksToday}</span></p>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderActivityFeed(rows) {
      if (!rows.length) {
        renderEmptyState('No data yet. Activity feed will populate after agents write logs.');
        return;
      }

      activityFeedEl.innerHTML = rows.map(row => {
        const agent = AGENTS.find(a => a.name === row.agent_name);
        const color = agent?.color || '#64748B';
        const badge = row.agent_name || 'Unknown';
        const status = row.status || 'N/A';
        return `
          <div class="bg-white/[0.03] border border-white/10 rounded-lg p-3" style="border-left:3px solid ${color}">
            <div class="flex items-center justify-between gap-2 mb-2">
              <span class="text-xs font-semibold px-2 py-1 rounded-full" style="background:${color}22; color:${color}; border:1px solid ${color}66;">${badge}</span>
              <span class="text-xs text-slate-400">${formatDateTime(row.created_at)}</span>
            </div>
            <p class="text-sm text-slate-100 mb-2">${row.task_description || 'No data yet'}</p>
            <div class="flex items-center gap-2 text-xs">
              <span class="bg-slate-700/40 text-slate-300 px-2 py-1 rounded border border-slate-600/40">${row.model_used || 'N/A'}</span>
              <span class="px-2 py-1 rounded ${statusClass(status)}">${status}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderTaskStats(rows, todayCountByAgent) {
      const todayStart = startOfToday();
      const weekStart = startOfWeek();

      let totalToday = 0;
      let totalWeek = 0;
      let completedToday = 0;

      for (const row of rows) {
        const d = new Date(row.created_at);
        if (Number.isNaN(d.getTime())) continue;

        if (d >= weekStart) totalWeek += 1;
        if (d >= todayStart) {
          totalToday += 1;
          if ((row.status || '').toLowerCase() === 'completed') completedToday += 1;
        }
      }

      const mostActive = AGENTS.map(a => ({ name: a.name, count: todayCountByAgent[a.name] || 0 }))
        .sort((a, b) => b.count - a.count)[0];
      const mostActiveText = mostActive && mostActive.count > 0 ? `${mostActive.name} (${mostActive.count})` : 'N/A';
      const successRate = totalToday > 0 ? `${((completedToday / totalToday) * 100).toFixed(1)}%` : 'N/A';

      const stats = [
        { label: 'Total Tasks Today', value: String(totalToday), glow: '#06B6D4' },
        { label: 'Total Tasks This Week', value: String(totalWeek), glow: '#7C3AED' },
        { label: 'Most Active Agent', value: mostActiveText, glow: '#F59E0B' },
        { label: 'Success Rate', value: successRate, glow: '#10B981' }
      ];

      taskStatsEl.innerHTML = stats.map(s => `
        <div class="glass-card p-4 opacity-0 card-stagger" style="box-shadow: 0 0 24px ${s.glow}22;">
          <p class="text-xs uppercase tracking-wide text-slate-400 mb-1">${s.label}</p>
          <p class="text-lg font-semibold">${s.value}</p>
        </div>
      `).join('');
    }

    function renderModelUsage(latestByAgent, todayCountByAgent) {
      modelUsageRowsEl.innerHTML = AGENTS.map(agent => {
        const latest = latestByAgent[agent.name] || null;
        const model = latest?.model_used || 'N/A';
        const tasks = todayCountByAgent[agent.name] || 0;
        return `
          <tr class="border-b border-white/10">
            <td class="py-2">
              <span class="inline-flex items-center gap-2">
                <span class="w-2 h-2 rounded-full" style="background:${agent.color}"></span>
                ${agent.name}
              </span>
            </td>
            <td class="py-2 text-slate-300">${model}</td>
            <td class="py-2 text-right text-slate-100">${tasks}</td>
          </tr>
        `;
      }).join('');
    }

    async function loadAgentsData() {
      const { data, error } = await supabaseClient
        .from('agent_logs')
        .select('agent_name, task_description, model_used, status, created_at')
        .order('created_at', { ascending: false })
        .limit(5000);

      if (error) {
        agentsLastSyncEl.textContent = 'Sync failed';
        renderEmptyState(`Unable to fetch agent logs right now: ${error.message || 'Unknown error'}`);
        return;
      }

      const rows = (data || []).map(r => ({ ...r, agent_name: normalizeAgentName(r.agent_name) }));
      const todayStart = startOfToday();
      const latestByAgent = {};
      const todayCountByAgent = {};
      AGENTS.forEach(a => { todayCountByAgent[a.name] = 0; });

      for (const row of rows) {
        const name = row.agent_name;
        if (AGENTS.some(a => a.name === name) && !latestByAgent[name]) latestByAgent[name] = row;
        if (AGENTS.some(a => a.name === name)) {
          const d = new Date(row.created_at);
          if (!Number.isNaN(d.getTime()) && d >= todayStart) todayCountByAgent[name] += 1;
        }
      }

      renderAgentCards(latestByAgent, todayCountByAgent);
      renderActivityFeed(rows.slice(0, 50));
      renderTaskStats(rows, todayCountByAgent);
      renderModelUsage(latestByAgent, todayCountByAgent);

      const panel = document.getElementById('panel-agents');
      staggerIn(panel);
      agentsLastSyncEl.textContent = `Last sync: ${new Date().toLocaleTimeString()}`;
    }

    function initAgentsRealtime() {
      if (agentsInitialized) return;
      agentsInitialized = true;

      loadAgentsData();

      supabaseClient.channel('agent-logs-live')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'agent_logs' }, () => loadAgentsData())
        .subscribe();

      setInterval(loadAgentsData, 30000);
    }


    function badgeClassCategory(v) {
      if (v === 'Work') return 'bg-purple-500/20 text-purple-300 border border-purple-400/30';
      if (v === 'Marketing') return 'bg-amber-500/20 text-amber-300 border border-amber-400/30';
      if (v === 'Development') return 'bg-emerald-500/20 text-emerald-300 border border-emerald-400/30';
      if (v === 'Personal') return 'bg-cyan-500/20 text-cyan-300 border border-cyan-400/30';
      return 'bg-slate-500/20 text-slate-300 border border-slate-400/30';
    }

    function badgeClassPriority(v) {
      if (v === 'Urgent') return 'bg-red-500/20 text-red-300 border border-red-400/30';
      if (v === 'Normal') return 'bg-blue-500/20 text-blue-300 border border-blue-400/30';
      if (v === 'Someday') return 'bg-slate-500/20 text-slate-300 border border-slate-400/30';
      return 'bg-slate-500/20 text-slate-300 border border-slate-400/30';
    }

    function badgeClassTrack(v) {
      if (v === 'On Track') return 'bg-emerald-500/20 text-emerald-300 border border-emerald-400/30';
      if (v === 'At Risk') return 'bg-amber-500/20 text-amber-300 border border-amber-400/30';
      if (v === 'Off Track') return 'bg-red-500/20 text-red-300 border border-red-400/30';
      return 'bg-slate-500/20 text-slate-300 border border-slate-400/30';
    }

    function formatShortDate(value) {
      if (!value) return 'N/A';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return 'N/A';
      return d.toLocaleDateString();
    }

    function taskCardHTML(task) {
      return `
        <article class="task-card" draggable="true" data-task-id="${task.id}" data-task='${JSON.stringify(task).replaceAll("'", "&#39;")}'>
          <div class="flex items-start justify-between gap-2 mb-2">
            <div class="flex items-start gap-2 flex-1">
              <span class="w-4 h-4 mt-[2px] rounded-full border border-slate-400/60"></span>
              <p class="font-semibold text-sm leading-tight break-words">${task.title || 'Untitled Task'}</p>
            </div>
            <div class="dot-menu">
              <button class="text-slate-400 hover:text-slate-200" data-menu-btn="${task.id}">⋯</button>
              <div class="dot-dropdown hidden" data-menu="${task.id}">
                <button data-edit="${task.id}">Edit</button>
                <button data-delete="${task.id}" class="text-red-300">Delete</button>
              </div>
            </div>
          </div>
          <div class="flex flex-wrap gap-2 text-[11px] mb-2">
            <span class="px-2 py-1 rounded-full ${badgeClassCategory(task.category || 'N/A')}">${task.category || 'N/A'}</span>
            <span class="px-2 py-1 rounded-full ${badgeClassPriority(task.priority || 'N/A')}">${task.priority || 'N/A'}</span>
            <span class="px-2 py-1 rounded-full ${badgeClassTrack(task.track_status || 'N/A')}">${task.track_status || 'N/A'}</span>
          </div>
          <p class="text-[11px] text-slate-400">Due: ${formatShortDate(task.due_date)}</p>
        </article>
      `;
    }

    function emptyColumnHTML(msg) { return `<div class="text-xs text-slate-500 border border-dashed border-white/10 rounded-lg p-4 text-center">${msg}</div>`; }

    function filteredRows(rows) {
      return rows.filter(r => {
        const catOk = taskFilterCategoryEl.value === 'all' || (r.category || '') === taskFilterCategoryEl.value;
        const priOk = taskFilterPriorityEl.value === 'all' || (r.priority || '') === taskFilterPriorityEl.value;
        return catOk && priOk;
      });
    }

    function renderTasksColumns(rows) {
      const filtered = filteredRows(rows);
      const todo = filtered.filter(r => (r.status || 'todo') === 'todo');
      const doing = filtered.filter(r => r.status === 'in_progress');
      const done = filtered.filter(r => r.status === 'done');
      todoColumnEl.innerHTML = todo.length ? todo.map(taskCardHTML).join('') : emptyColumnHTML('No tasks yet');
      inProgressColumnEl.innerHTML = doing.length ? doing.map(taskCardHTML).join('') : emptyColumnHTML('No tasks in progress');
      doneColumnEl.innerHTML = done.length ? done.map(taskCardHTML).join('') : emptyColumnHTML('No completed tasks yet');
      todoCountEl.textContent = String(todo.length);
      inProgressCountEl.textContent = String(doing.length);
      doneCountEl.textContent = String(done.length);
      bindTaskDnD();
      bindTaskMenus();
      updateProductivityBar(todo.length, doing.length, done.length);
    }

    function updateProductivityBar(todoCount, doingCount, doneCount) {
      const total = todoCount + doingCount + doneCount;
      const donePct = total ? (doneCount / total) * 100 : 0;
      const cards = [
        { label: 'To Do', count: todoCount, pct: total ? (todoCount / total) * 100 : 0, color: '#3B82F6' },
        { label: 'Doing', count: doingCount, pct: total ? (doingCount / total) * 100 : 0, color: '#F59E0B' },
        { label: 'Done', count: doneCount, pct: total ? (doneCount / total) * 100 : 0, color: '#10B981' }
      ];
      tasksCompactStatsEl.innerHTML = cards.map(c => `<div class="rounded-xl border p-2 bg-white/[0.03]" style="border-color:${c.color}66; box-shadow:0 0 14px ${c.color}22;"><p class="text-[10px] text-slate-400 uppercase">${c.label}</p><p class="text-sm font-semibold" style="color:${c.color}">${c.count}</p><p class="text-[10px] text-slate-400">${c.pct.toFixed(0)}%</p></div>`).join('');
      let message = "Just getting started — let's go! 🚀";
      if (donePct >= 91) message = 'Outstanding — you crushed it! 🏆';
      else if (donePct >= 61) message = 'Almost there — finish strong! 🔥';
      else if (donePct >= 31) message = 'Good progress — keep pushing! 💪';
      tasksMotivationBadgeEl.textContent = message;
      const ctx = document.getElementById('tasksDonutChart');
      if (tasksDonutChart) tasksDonutChart.destroy();
      tasksDonutChart = new Chart(ctx, { type:'doughnut', data:{ labels:['To Do','Doing','Done'], datasets:[{ data:[todoCount,doingCount,doneCount], backgroundColor:['#3B82F6','#F59E0B','#10B981'], borderWidth:0 }]}, options:{ cutout:'72%', plugins:{legend:{display:false}}, responsive:true, maintainAspectRatio:false }});
    }

    let tasksCache = [];

    async function loadTasksData() {
      const { data, error } = await supabaseClient.from('todos').select('id, title, category, priority, due_date, completed, status, track_status, created_at').order('created_at', { ascending: false }).limit(2000);
      if (error) {
        todoColumnEl.innerHTML = emptyColumnHTML(`Unable to fetch todos: ${error.message || 'Unknown error'}`);
        return;
      }
      tasksCache = data || [];
      renderTasksColumns(tasksCache);
      staggerIn(document.getElementById('panel-tasks'));
    }

    function bindTaskDnD() {
      document.querySelectorAll('.task-card').forEach(el => {
        el.addEventListener('dragstart', e => { el.classList.add('dragging'); e.dataTransfer.setData('text/plain', el.dataset.taskId); });
        el.addEventListener('dragend', () => el.classList.remove('dragging'));
      });
      [todoColumnEl, inProgressColumnEl, doneColumnEl].forEach(col => {
        const status = col.id === 'todoColumn' ? 'todo' : col.id === 'inProgressColumn' ? 'in_progress' : 'done';
        col.ondragover = (e) => { e.preventDefault(); col.classList.add('drop-highlight'); };
        col.ondragleave = () => col.classList.remove('drop-highlight');
        col.ondrop = async (e) => {
          e.preventDefault(); col.classList.remove('drop-highlight');
          const taskId = e.dataTransfer.getData('text/plain'); if (!taskId) return;
          const { error } = await supabaseClient.from('todos').update({ status, completed: status === 'done' }).eq('id', taskId);
          if (!error) loadTasksData();
        };
      });
    }

    function addTaskFormHTML(status) {
      return `<form class="glass-card p-3 space-y-2" data-add-form="${status}">
        <input name="title" required placeholder="Task title" class="w-full bg-slate-900/70 border border-white/10 rounded px-2 py-1 text-sm" />
        <div class="grid grid-cols-2 gap-2">
          <select name="category" class="bg-slate-900/70 border border-white/10 rounded px-2 py-1 text-sm"><option>Work</option><option>Marketing</option><option>Development</option><option>Personal</option></select>
          <select name="priority" class="bg-slate-900/70 border border-white/10 rounded px-2 py-1 text-sm"><option>Urgent</option><option>Normal</option><option>Someday</option></select>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <select name="track_status" class="bg-slate-900/70 border border-white/10 rounded px-2 py-1 text-sm"><option>On Track</option><option>At Risk</option><option>Off Track</option></select>
          <input type="date" name="due_date" class="bg-slate-900/70 border border-white/10 rounded px-2 py-1 text-sm" />
        </div>
        <div class="flex gap-2 justify-end"><button type="button" data-cancel-add="${status}" class="text-xs px-2 py-1 border border-white/15 rounded">Cancel</button><button type="submit" class="text-xs px-2 py-1 border border-cyan-400/35 text-cyan-200 rounded">Save</button></div>
      </form>`;
    }

    function bindAddTask() {
      document.querySelectorAll('[data-add-status]').forEach(btn => {
        btn.onclick = () => {
          const status = btn.dataset.addStatus;
          const target = status === 'todo' ? addFormTodoEl : status === 'in_progress' ? addFormInProgressEl : addFormDoneEl;
          target.innerHTML = addTaskFormHTML(status);
          target.classList.remove('hidden');
          target.querySelector('[data-cancel-add]').onclick = () => { target.classList.add('hidden'); target.innerHTML = ''; };
          target.querySelector('form').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const payload = {
              title: fd.get('title'), category: fd.get('category'), priority: fd.get('priority'), track_status: fd.get('track_status'), due_date: fd.get('due_date') || null,
              status, completed: status === 'done'
            };
            const { error } = await supabaseClient.from('todos').insert(payload);
            if (!error) { target.classList.add('hidden'); target.innerHTML = ''; loadTasksData(); }
          };
        };
      });
    }

    function openEditModal(task) {
      document.getElementById('editTaskId').value = task.id;
      document.getElementById('editTitle').value = task.title || '';
      document.getElementById('editCategory').value = task.category || 'Work';
      document.getElementById('editPriority').value = task.priority || 'Normal';
      document.getElementById('editTrackStatus').value = task.track_status || 'On Track';
      document.getElementById('editDueDate').value = task.due_date ? new Date(task.due_date).toISOString().slice(0,10) : '';
      document.getElementById('editStatus').value = task.status || 'todo';
      editTaskModalEl.classList.remove('hidden');
      editTaskModalEl.classList.add('flex');
    }

    function bindTaskMenus() {
      document.querySelectorAll('[data-menu-btn]').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const id = btn.dataset.menuBtn;
          document.querySelectorAll('.dot-dropdown').forEach(d => d.classList.add('hidden'));
          const menu = document.querySelector(`[data-menu="${id}"]`);
          if (menu) menu.classList.toggle('hidden');
        };
      });
      document.querySelectorAll('[data-edit]').forEach(btn => {
        btn.onclick = () => {
          const id = btn.dataset.edit;
          const card = document.querySelector(`[data-task-id="${id}"]`);
          if (!card) return;
          const task = JSON.parse(card.dataset.task.replaceAll('&#39;', "'"));
          openEditModal(task);
        };
      });
      document.querySelectorAll('[data-delete]').forEach(btn => {
        btn.onclick = async () => {
          const id = btn.dataset.delete;
          const { error } = await supabaseClient.from('todos').delete().eq('id', id);
          if (!error) loadTasksData();
        };
      });
    }

    function wireEditModal() {
      document.getElementById('editCancel').onclick = () => { editTaskModalEl.classList.add('hidden'); editTaskModalEl.classList.remove('flex'); };
      editTaskFormEl.onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('editTaskId').value;
        const payload = {
          title: document.getElementById('editTitle').value,
          category: document.getElementById('editCategory').value,
          priority: document.getElementById('editPriority').value,
          track_status: document.getElementById('editTrackStatus').value,
          due_date: document.getElementById('editDueDate').value || null,
          status: document.getElementById('editStatus').value,
          completed: document.getElementById('editStatus').value === 'done'
        };
        const { error } = await supabaseClient.from('todos').update(payload).eq('id', id);
        if (!error) { editTaskModalEl.classList.add('hidden'); editTaskModalEl.classList.remove('flex'); loadTasksData(); }
      };
    }

    async function seedSampleTasks() {
      const titles = [
        'Analyze competitor content strategy',
        'Write weekly newsletter draft',
        'Set up API integration',
        'Record product demo video',
        'Update landing page copy',
        'Research new influencer partnerships'
      ];
      const { data, error } = await supabaseClient.from('todos').select('title').in('title', titles);
      if (error) return;
      if ((data || []).length >= 6) return;
      const samples = [
        { title:'Analyze competitor content strategy', category:'Work', priority:'Urgent', track_status:'At Risk', status:'todo', completed:false },
        { title:'Write weekly newsletter draft', category:'Marketing', priority:'Normal', track_status:'On Track', status:'todo', completed:false },
        { title:'Set up API integration', category:'Development', priority:'Normal', track_status:'On Track', status:'in_progress', completed:false },
        { title:'Record product demo video', category:'Marketing', priority:'Urgent', track_status:'At Risk', status:'in_progress', completed:false },
        { title:'Update landing page copy', category:'Work', priority:'Someday', track_status:'On Track', status:'done', completed:true },
        { title:'Research new influencer partnerships', category:'Marketing', priority:'Normal', track_status:'On Track', status:'done', completed:true }
      ];
      await supabaseClient.from('todos').insert(samples);
    }

    function initTasksRealtime() {
      if (tasksInitialized) return;
      tasksInitialized = true;
      bindAddTask();
      wireEditModal();
      taskFilterCategoryEl.onchange = () => renderTasksColumns(tasksCache);
      taskFilterPriorityEl.onchange = () => renderTasksColumns(tasksCache);
      seedSampleTasks().then(loadTasksData);
      supabaseClient.channel('todos-live').on('postgres_changes', { event: '*', schema: 'public', table: 'todos' }, () => loadTasksData()).subscribe();
      setInterval(loadTasksData, 30000);
    }

    function activateTab(tabName) {
      buttons.forEach(btn => {
        const active = btn.dataset.tab === tabName;
        btn.classList.toggle('text-white', active);
        btn.classList.toggle('text-slate-300', !active);
      });

      panels.forEach(panel => panel.classList.toggle('active', panel.id === `panel-${tabName}`));

      const activeBtn = buttons.find(btn => btn.dataset.tab === tabName);
      const activePanel = document.getElementById(`panel-${tabName}`);
      movePillTo(activeBtn);
      staggerIn(activePanel);

      if (tabName === 'agents') initAgentsRealtime();
      if (tabName === 'tasks') initTasksRealtime();
    }

    buttons.forEach(btn => btn.addEventListener('click', () => activateTab(btn.dataset.tab)));
    window.addEventListener('resize', () => {
      const activeBtn = buttons.find(btn => btn.classList.contains('text-white'));
      if (activeBtn) movePillTo(activeBtn);
    });

    activateTab('dashboard');
  </script>
</body>
</html>
